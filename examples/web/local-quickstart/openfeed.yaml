persona:
  demographics: >
    Curious builder evaluating OpenFeed locally. Wants a quick, concrete demo
    before connecting real sources or a production feed client.

interests:
- topic: demo
  description: A tiny local-only feed used to exercise push and feedback.
  consumer_type: local_web
  consumer_config:
    channel_id: default
  language_preferences:
  - English
  platforms:
    web:
      html_template: ../templates/default/web.html
  max_content_age_days: 30
  freshness_half_life_days: 7
  youtube_duration_max_seconds: 600

llm:
  client: openrouter
  timeout_seconds: 240
  openrouter:
    api_base: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: google/gemini-3.1-flash-lite-preview
    temperature: 0
    max_tokens: 2000
    app_name: openfeed-local-quickstart
    referer: ''

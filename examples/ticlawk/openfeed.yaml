persona:
  demographics: 'Software engineer in their 30s, pragmatic and curious. Interested
    in

    cutting-edge tech, hands-on tutorials, and well-produced documentary-style

    content. Values depth over hype.

    '
interests:
- topic: cooking
  description: Practical home cooking TikToks with clear techniques and ideas worth trying.
  consumer_type: ticlawk
  consumer_config:
    channel_id: your-ticlawk-channel-id
  language_preferences:
  - English
  platforms:
    tiktok: {}
  max_content_age_days: 30
  freshness_half_life_days: 7
  youtube_duration_max_seconds: 600
llm:
  client: openrouter
  timeout_seconds: 240
  openrouter:
    api_base: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: google/gemini-3.1-flash-lite-preview
    temperature: 0
    max_tokens: 2000
    app_name: openfeed
    referer: ''

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>{{card.title}}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100vw;height:100vh;overflow:hidden;background:{{style.bg}};color:{{style.text}};
      font:17px/1.45 {{style.font|default('"Avenir Next","Avenir",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif')}};
      font-weight:520;-webkit-font-smoothing:antialiased;letter-spacing:0}
    #ticlawk-root{position:relative;width:100vw;height:100vh;overflow:hidden;background:{{style.bg}};
      background-image:{{style.backdrop|default('none') }}}
    #ticlawk-root::before{content:"";position:absolute;inset:0;pointer-events:none;
      background:{{style.overlay|default('linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.18))') }};
      z-index:1}
    .view-on-x{position:absolute;top:22px;right:18px;z-index:20;display:flex;align-items:center;gap:6px;
      color:{{style.text}};text-decoration:none;padding:8px 12px;border-radius:999px;
      border:1px solid {{style.border}};background:{{style.pill_bg|default('rgba(0,0,0,.42)') }};
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-size:12px;font-weight:760;letter-spacing:0}
    .view-on-x svg{width:12px;height:12px;fill:currentColor;display:block}
    .topic-mark{position:absolute;top:24px;left:24px;z-index:20;color:{{style.accent}};font-size:11px;
      font-weight:820;letter-spacing:0;text-transform:uppercase}
    .pages{position:relative;z-index:5;display:flex;width:100vw;height:100vh;overflow-x:auto;overflow-y:hidden;
      scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
    .pages::-webkit-scrollbar{display:none;width:0}
    .page{flex:0 0 100vw;height:100vh;scroll-snap-align:start;scroll-snap-stop:always;position:relative}
    .page.tweet{padding:0}
    .text-frame{position:absolute;left:30px;top:50%;transform:translateY(-50%);
      width:min(312px, calc(100vw - 74px));min-width:0;padding:{{style.frame_padding|default('0') }};border:{{style.frame_border|default('0') }};
      border-radius:{{style.frame_radius|default('0') }};background:{{style.frame_bg|default('transparent') }};
      box-shadow:{{style.frame_shadow|default('none') }}}
    .author{margin-bottom:12px;color:{{style.muted}};font-size:16px;font-weight:780}
    .author a{color:inherit;text-decoration:none}
    .quote-mark{font-size:{{style.quote_size|default('106px') }};line-height:.66;font-weight:900;
      color:{{style.quote}};font-family:Georgia,"Times New Roman",serif;user-select:none;margin-left:-4px;margin-bottom:8px}
    .post-text{color:{{style.text}};white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;letter-spacing:0}
    .size-s .post-text{font-size:32px;line-height:1.24;font-weight:760}
    .size-m .post-text{font-size:25px;line-height:1.34;font-weight:660}
    .size-l .post-text{font-size:20px;line-height:1.42;font-weight:560}
    .media{display:flex;align-items:center;justify-content:center;padding:0;background:#000}
    .media a{display:flex;align-items:center;justify-content:center;width:100%;height:100%;text-decoration:none;color:inherit;position:relative;overflow:hidden}
    .media img{width:100%;height:100%;object-fit:contain;display:block;background:#000}
    .video-poster{background:{{style.surface}}}
    .play-icon{width:82px;height:82px;border-radius:50%;background:rgba(0,0,0,.62);box-shadow:0 8px 28px rgba(0,0,0,.35);
      display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.22)}
    .play-icon::after{content:"";display:block;width:0;height:0;border-left:28px solid #fff;border-top:18px solid transparent;border-bottom:18px solid transparent;margin-left:6px}
    .dots{position:absolute;z-index:30;bottom:92px;left:0;right:0;display:flex;justify-content:center;gap:7px;pointer-events:none}
    .dots span{width:6px;height:6px;border-radius:50%;background:{{style.dot|default('rgba(255,255,255,.28)') }};transition:transform .2s,background .2s}
    .dots span.active{background:{{style.accent}};transform:scale(1.25)}
    .footer-line{position:absolute;z-index:20;bottom:34px;left:28px;right:28px;display:flex;justify-content:space-between;
      color:{{style.muted}};font-size:11px;font-weight:720;letter-spacing:0;text-transform:uppercase}
    .footer-line span{max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .footer-line span:last-child{text-align:right}
  </style>
</head>
<body>
  <div id="ticlawk-root">
    <div class="topic-mark">{{style.label}}</div>
    <a class="view-on-x" href="{{card.url}}" target="_blank" rel="noopener noreferrer" aria-label="View on X">
      <span>View</span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.9 2h3.3l-7.2 8.2L23.5 22h-6.7l-5.2-6.8L5.6 22H2.3l7.7-8.8L1.8 2h6.8l4.7 6.2L18.9 2zm-1.2 18h1.8L7.6 3.9H5.7L17.7 20z"/></svg>
    </a>
    <div class="pages" id="pages"></div>
    <div class="dots" id="dots"></div>
    <div class="footer-line"><span id="meta-author"></span><span>{{style.footer|default('OpenFeed') }}</span></div>
  </div>
  <script>
    (() => {
      const input = {{HTMLCardRenderInput|tojson}};
      const card = input.card || {};
      const n = card.normalized || {};
      const pages = document.getElementById('pages');
      const dots = document.getElementById('dots');
      const root = document.getElementById('ticlawk-root');
      const author = n.author || 'unknown';
      const authorUrl = n.author_url || card.url || '#';
      const text = String(n.text || card.title || '').trim();
      document.getElementById('meta-author').textContent = author === 'unknown' ? 'X' : '@' + author;

      function units(s) {
        let total = 0;
        for (const ch of s) {
          if (ch === '\n') total += 24;
          else if (/\s/.test(ch)) total += 1;
          else total += ch.codePointAt(0) > 0xffff ? 2 : 1;
        }
        return total;
      }
      function splitOversize(piece, max) {
        const out = [];
        let cur = '';
        let curUnits = 0;
        for (const ch of piece) {
          const u = units(ch);
          if (cur && curUnits + u > max) {
            out.push(cur.trim());
            cur = ch;
            curUnits = u;
          } else {
            cur += ch;
            curUnits += u;
          }
        }
        if (cur.trim()) out.push(cur.trim());
        return out;
      }
      function splitText(value, max) {
        if (!value) return [''];
        if (units(value) <= max) return [value];
        const pieces = value.split(/(\n\n+|(?<=[.!?])\s+|\s+)/).filter(Boolean);
        const out = [];
        let cur = '';
        let curUnits = 0;
        for (const piece of pieces) {
          const u = units(piece);
          if (u > max) {
            if (cur.trim()) out.push(cur.trim());
            out.push(...splitOversize(piece, max));
            cur = '';
            curUnits = 0;
            continue;
          }
          if (cur.trim() && curUnits + u > max) {
            out.push(cur.trim());
            cur = piece.trimStart();
            curUnits = units(cur);
            continue;
          }
          cur += piece;
          curUnits += u;
        }
        if (cur.trim()) out.push(cur.trim());
        return out.length ? out : [value];
      }
      function textPage(chunk, index) {
        const section = document.createElement('section');
        section.className = 'page tweet';
        const frame = document.createElement('div');
        frame.className = 'text-frame';
        if (index === 0 && author) {
          const by = document.createElement('div');
          by.className = 'author';
          const a = document.createElement('a');
          a.href = authorUrl;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = author === 'unknown' ? 'X' : '@' + author;
          by.appendChild(a);
          frame.appendChild(by);
        }
        const quote = document.createElement('div');
        quote.className = 'quote-mark';
        quote.textContent = {{style.quote_char|tojson}};
        const body = document.createElement('div');
        body.className = 'post-text';
        body.textContent = chunk;
        frame.appendChild(quote);
        frame.appendChild(body);
        section.appendChild(frame);
        return section;
      }
      function mediaPage(url) {
        const section = document.createElement('section');
        section.className = 'page media';
        const a = document.createElement('a');
        a.href = card.url || url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        const isVideo = /\.mp4($|\?)/i.test(url) || url.includes('video.twimg.com');
        if (isVideo) {
          a.className = 'video-poster';
          const play = document.createElement('div');
          play.className = 'play-icon';
          a.appendChild(play);
        } else {
          const img = document.createElement('img');
          img.src = url;
          img.alt = '';
          a.appendChild(img);
        }
        section.appendChild(a);
        return section;
      }
      const maxUnits = {{style.max_units|default(180)}};
      const chunks = splitText(text, maxUnits);
      const largest = Math.max(...chunks.map(units));
      root.classList.add(largest <= 55 ? 'size-s' : largest <= 115 ? 'size-m' : 'size-l');
      chunks.forEach((chunk, i) => pages.appendChild(textPage(chunk, i)));
      (n.media_urls || []).forEach((url) => pages.appendChild(mediaPage(String(url))));
      const pageNodes = [...pages.querySelectorAll('.page')];
      const dotCount = Math.min(pageNodes.length, 7);
      for (let i = 0; i < dotCount; i += 1) dots.appendChild(document.createElement('span'));
      const dotNodes = [...dots.querySelectorAll('span')];
      if (!dotNodes.length) return;
      const dotFor = (idx) => {
        if (pageNodes.length <= dotCount) return idx;
        if (idx < 3) return idx;
        if (idx >= pageNodes.length - 3) return dotCount - (pageNodes.length - idx);
        return 3;
      };
      dotNodes[dotFor(0)].classList.add('active');
      pages.addEventListener('scroll', () => {
        requestAnimationFrame(() => {
          const idx = Math.round(pages.scrollLeft / window.innerWidth);
          const active = dotFor(Math.max(0, Math.min(pageNodes.length - 1, idx)));
          dotNodes.forEach((d, i) => d.classList.toggle('active', i === active));
        });
      }, {passive: true});
    })();
  </script>
</body>
</html>
